<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
  <title>作品集</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft JhengHei", sans-serif;
      text-decoration: none;
    } 
    body {
      line-height: 1.6;
      background-color: #f9f9f9;
      color: #333;
      position: relative;
    }

    /* Header */
    header {
      background-color: #4f46e5;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 1.5rem;
      transition: color 0.3s;
    }

    header nav a:hover {
      color: #facc15;
    }

    /* Hero Section */
    .hero {
      background: url('https://source.unsplash.com/1600x600/?nature,technology') center/cover no-repeat;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
      text-align: center;
      padding: 0 1rem;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
    }

    /* Card Section */
    .cards {
      display: flex;
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      width: 33%;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 1rem;
    }

    .card-content h3 {
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
    }

    .card-content p {
      font-size: 0.95rem;
      color: #555;
    }

    /* Footer */
    footer {
      display: absolute;
      background-color: #1f2937;
      color: #fff;
      text-align: center;
      padding: 1.5rem;
      margin-top: 2rem;
      position: relative;
      bottom: 0;
      width: 100%;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      header nav {
        margin-top: 0.5rem;
      }
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
